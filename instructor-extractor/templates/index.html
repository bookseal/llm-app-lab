<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Instructor Job Post Extractor</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
    textarea { width: 100%; height: 200px; font-size: 14px; padding: 8px; box-sizing: border-box; }
    button { margin-top: 12px; padding: 8px 20px; font-size: 15px; cursor: pointer; }
    #copy-btn { margin-left: 8px; }
    #copy-btn:disabled { cursor: not-allowed; opacity: 0.5; }
    #result { margin-top: 20px; padding: 16px; background: #f5f5f5; border-radius: 6px;
              white-space: pre-wrap; min-height: 40px; }
    #copy-status { margin-left: 8px; color: green; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Instructor Job Post Extractor</h1>
  <p>Paste an instructor job post (from email, KakaoTalk, etc.) below and click [Extract].</p>

  <textarea id="input" placeholder="Paste the instructor job post here..."></textarea>
  <button id="extract-btn">Extract</button>
  <button id="copy-btn" disabled>Copy for spreadsheet</button>
  <span id="copy-status"></span>

  <div id="result">Results will appear here.</div>

  <script>
    const button = document.getElementById("extract-btn");
    const copyBtn = document.getElementById("copy-btn");
    const copyStatus = document.getElementById("copy-status");
    const input = document.getElementById("input");
    const result = document.getElementById("result");

    let lastData = null;  // the most recent extraction, used by the copy button

    button.addEventListener("click", async () => {
      const text = input.value.trim();
      if (text === "") {
        result.textContent = "⚠️ Please enter some text first.";
        return;
      }

      result.textContent = "Extracting...";

      // ① POST the text to the server's /api/extract
      const resp = await fetch("/api/extract", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text }),
      });

      // ② Unpack the JSON response into a JS object
      const data = await resp.json();
      lastData = data;

      // ③ Render each field (null/empty values are flagged as ⚠️ missing)
      render(data);

      // a result exists now, so the copy button can be used
      copyBtn.disabled = false;
      copyStatus.textContent = "";
    });

    function render(data) {
      const lines = [];
      for (const [key, value] of Object.entries(data)) {
        if (value === null || value === "") {
          lines.push("⚠️ " + key + ": (missing)");
        } else {
          lines.push(key + ": " + value);
        }
      }
      result.textContent = lines.join("\n");
    }

    copyBtn.addEventListener("click", async () => {
      if (lastData === null) return;
      // Build one tab-separated row of values (missing fields become empty cells),
      // so pasting into a spreadsheet drops the values into adjacent columns.
      const row = Object.values(lastData)
        .map((v) => (v === null ? "" : v))
        .join("\t");
      await navigator.clipboard.writeText(row);
      copyStatus.textContent = "✓ Copied! Paste into a spreadsheet.";
    });
  </script>
</body>
</html>
