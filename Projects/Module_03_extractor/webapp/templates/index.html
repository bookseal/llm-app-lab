<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Instructor Job Post Extractor</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
    textarea { width: 100%; height: 200px; font-size: 14px; padding: 8px; box-sizing: border-box; }
    button { margin-top: 12px; padding: 8px 20px; font-size: 15px; cursor: pointer; }
    #copy-btn, #email-btn { margin-left: 8px; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
    #result, #email-output { margin-top: 20px; padding: 16px; background: #f5f5f5;
              border-radius: 6px; white-space: pre-wrap; }
    #result { min-height: 40px; }
    #email-output { display: none; border-left: 4px solid #4a90d9; }
    #copy-status { margin-left: 8px; color: green; font-size: 14px; }
    footer { margin-top: 28px; padding-top: 14px; border-top: 1px solid #eee;
             font-size: 13px; color: #777; }
  </style>
</head>
<body>
  <h1>Instructor Job Post Extractor</h1>
  <p>Paste an instructor job post (from email, KakaoTalk, etc.) below and click [Extract].
     Need something to try? <a href="/examples" target="_blank" rel="noopener">Open example texts ↗</a></p>

  <textarea id="input" placeholder="Paste the instructor job post here..."></textarea>
  <button id="extract-btn">Extract</button>
  <button id="copy-btn" disabled>Copy for spreadsheet</button>
  <button id="email-btn" disabled>Draft follow-up email</button>
  <button id="copy-email-btn" disabled>Copy email</button>
  <span id="copy-status"></span>

  <div id="result">Results will appear here.</div>
  <div id="email-output"></div>

  <footer>
    Want the code or to run it yourself?
    <a href="https://github.com/bookseal/llm-app-lab" target="_blank" rel="noopener">github.com/bookseal/llm-app-lab</a>
  </footer>

  <script>
    const button = document.getElementById("extract-btn");
    const copyBtn = document.getElementById("copy-btn");
    const emailBtn = document.getElementById("email-btn");
    const copyStatus = document.getElementById("copy-status");
    const input = document.getElementById("input");
    const result = document.getElementById("result");
    const emailOutput = document.getElementById("email-output");
    const copyEmailBtn = document.getElementById("copy-email-btn");

    let lastData = null;  // the most recent extraction, used by copy + email buttons

    button.addEventListener("click", async () => {
      const text = input.value.trim();
      if (text === "") {
        result.textContent = "⚠️ Please enter some text first.";
        return;
      }

      result.textContent = "Extracting...";

      // ① POST the text to the server's /api/extract
      const resp = await fetch("/api/extract", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text }),
      });

      // ② Unpack the JSON response into a JS object
      const data = await resp.json();
      lastData = data;

      // ③ Render each field (null/empty values are flagged as ⚠️ missing)
      render(data);

      // ④ enable the action buttons; the email button only if something is missing
      copyBtn.disabled = false;
      copyStatus.textContent = "";
      emailBtn.disabled = !hasMissing(data);
      emailOutput.style.display = "none";
      copyEmailBtn.disabled = true;
    });

    function render(data) {
      const lines = [];
      for (const [key, value] of Object.entries(data)) {
        if (value === null || value === "") {
          lines.push("⚠️ " + key + ": (missing)");
        } else {
          lines.push(key + ": " + value);
        }
      }
      result.textContent = lines.join("\n");
    }

    function hasMissing(data) {
      return Object.values(data).some((v) => v === null || v === "");
    }

    copyBtn.addEventListener("click", async () => {
      if (lastData === null) return;
      // Build one tab-separated row of values (missing fields become empty cells),
      // so pasting into a spreadsheet drops the values into adjacent columns.
      const row = Object.values(lastData)
        .map((v) => (v === null ? "" : v))
        .join("\t");
      await navigator.clipboard.writeText(row);
      copyStatus.textContent = "✓ Copied! Paste into a spreadsheet.";
    });

    emailBtn.addEventListener("click", async () => {
      if (lastData === null) return;
      emailOutput.style.display = "block";
      emailOutput.textContent = "Drafting...";

      const resp = await fetch("/api/draft-email", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ data: lastData }),
      });
      const result = await resp.json();
      emailOutput.textContent = result.email || result.message || "(no draft)";
      // only allow copying when there is an actual draft
      copyEmailBtn.disabled = !result.email;
    });

    copyEmailBtn.addEventListener("click", async () => {
      await navigator.clipboard.writeText(emailOutput.textContent);
      copyStatus.textContent = "✓ Email copied!";
    });
  </script>
</body>
</html>
